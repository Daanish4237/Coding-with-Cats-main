<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Coding with Cats</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      --bg-from:      #7b6fcf;
      --bg-to:        #a78fe8;
      --accent:       #7ec8f5;
      --accent-dark:  #5aaee0;
      --card-bg:      rgba(255, 255, 255, 0.95);
      --input-bg:     rgba(235, 242, 255, 0.75);
      --input-border: #c5d8f7;
      --input-focus:  #88b8f0;
      --text-dark:    #3d3580;
      --text-mid:     #7873b5;
      --text-light:   #a9a5d0;
      --success:      #4CAF50;
      --danger:       #f44336;
      --warning:      #ff9800;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #6c5fcf 0%, #8b7be8 40%, #a78fe8 70%, #b8a0f0 100%);
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 8px 24px rgba(90, 70, 180, 0.25);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header h1 {
      font-size: 32px;
      color: var(--text-dark);
      font-weight: 900;
    }

    .header-actions {
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #88c8f5 0%, #6aaee8 40%, #7b8fe8 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(100,150,235,.30);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(100,150,235,.40);
    }

    .btn-secondary {
      background: #e0e0e0;
      color: var(--text-dark);
    }

    .btn-secondary:hover {
      background: #d0d0d0;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #d32f2f;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #45a049;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .section {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 8px 24px rgba(90, 70, 180, 0.25);
    }

    .section-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 3px solid var(--accent);
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      animation: slideDown .25s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alert-success {
      background: #ddf4e8;
      color: #1a6640;
      border: 1.5px solid #9de6bf;
    }

    .alert-danger {
      background: #fde8ef;
      color: #8b1c3a;
      border: 1.5px solid #f7aac5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-mid);
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      padding: 12px 16px;
      border: 2px solid var(--input-border);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      color: var(--text-dark);
      background: var(--input-bg);
      transition: all 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--input-focus);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 0 4px rgba(136,184,240,.22);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    thead {
      background: linear-gradient(135deg, #88c8f5 0%, #7b8fe8 100%);
      color: white;
    }

    th {
      padding: 14px;
      text-align: left;
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    th.sortable:hover {
      background: rgba(255,255,255,0.1);
    }

    td {
      padding: 14px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
    }

    tbody tr:hover {
      background: rgba(126, 200, 245, 0.08);
    }

    .table-actions {
      display: flex;
      gap: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-mid);
      font-size: 16px;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        text-align: center;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔧 Admin Panel</h1>
      <div class="header-actions">
        <a href="/index.html" class="btn btn-secondary">← Back to Home</a>
      </div>
    </div>

    <div id="alert-box" style="display:none;"></div>

    <!-- Stage Management Section -->
    <div class="section">
      <h2 class="section-title">📚 Stage Management</h2>
      
      <div id="stage-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="stage-name">Stage Name</label>
            <input type="text" id="stage-name" placeholder="e.g., Printing Text" required>
          </div>
          <div class="form-group">
            <label for="stage-difficulty">Difficulty</label>
            <select id="stage-difficulty" required>
              <option value="">Select difficulty</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>
          <div class="form-group">
            <label for="stage-max-score">Max Score</label>
            <input type="number" id="stage-max-score" placeholder="e.g., 1000" min="0" required>
          </div>
        </div>
        <div class="form-group">
          <label for="stage-description">Description</label>
          <textarea id="stage-description" placeholder="Enter stage description..." required></textarea>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button id="add-stage-btn" class="btn btn-success" onclick="addStage()">➕ Add Stage</button>
          <button id="update-stage-btn" class="btn btn-primary" onclick="updateStage()" style="display: none;">💾 Update Stage</button>
          <button id="cancel-edit-btn" class="btn btn-secondary" onclick="cancelEdit()" style="display: none;">❌ Cancel</button>
        </div>
      </div>

      <div id="stages-table-container">
        <div class="loading">Loading stages...</div>
      </div>
    </div>

    <!-- Progress Report Section -->
    <div class="section">
      <h2 class="section-title">📊 Student Progress Report</h2>
      <div id="progress-table-container">
        <div class="loading">Loading progress data...</div>
      </div>
    </div>
  </div>

  <script>
    let currentEditStageId = null;
    let allStages = [];
    let allProgress = [];

    // Check admin authentication on page load
    async function checkAdminAuth() {
      try {
        const response = await fetch('/api/auth/check');
        const data = await response.json();
        
        if (!data.authenticated || data.role !== 'Admin') {
          window.location.href = '/index.html';
          return false;
        }
        return true;
      } catch (error) {
        console.error('Auth check failed:', error);
        window.location.href = '/index.html';
        return false;
      }
    }

    // Show alert message
    function showAlert(message, type = 'success') {
      const alertBox = document.getElementById('alert-box');
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type}`;
      alertBox.style.display = 'block';
      
      setTimeout(() => {
        alertBox.style.display = 'none';
      }, 5000);
    }

    // Load all stages
    async function loadStages() {
      try {
        const response = await fetch('/api/admin/stages');
        if (!response.ok) throw new Error('Failed to load stages');
        
        allStages = await response.json();
        renderStagesTable();
      } catch (error) {
        console.error('Error loading stages:', error);
        document.getElementById('stages-table-container').innerHTML = 
          '<div class="empty-state">Failed to load stages. Please try again.</div>';
      }
    }

    // Render stages table
    function renderStagesTable() {
      const container = document.getElementById('stages-table-container');
      
      if (allStages.length === 0) {
        container.innerHTML = '<div class="empty-state">No stages found. Add your first stage above!</div>';
        return;
      }

      const tableHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Difficulty</th>
              <th>Max Score</th>
              <th>Description</th>
              <th>Active</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${allStages.map(stage => `
              <tr>
                <td>${stage.stage_id}</td>
                <td>${stage.name}</td>
                <td>${stage.difficulty}</td>
                <td>${stage.maxScore || stage.maxscore || 'N/A'}</td>
                <td>${stage.description}</td>
                <td>${stage.isActive || stage.isactive ? '✅' : '❌'}</td>
                <td>
                  <div class="table-actions">
                    <button class="btn btn-primary btn-small" onclick="editStage('${stage.stage_id}')">✏️ Edit</button>
                    <button class="btn btn-danger btn-small" onclick="deleteStage('${stage.stage_id}')">🗑️ Delete</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      
      container.innerHTML = tableHTML;
    }

    // Add new stage
    async function addStage() {
      const name = document.getElementById('stage-name').value.trim();
      const difficulty = document.getElementById('stage-difficulty').value;
      const maxScore = parseInt(document.getElementById('stage-max-score').value);
      const description = document.getElementById('stage-description').value.trim();

      if (!name || !difficulty || !maxScore || !description) {
        showAlert('Please fill in all fields', 'danger');
        return;
      }

      try {
        const response = await fetch('/api/admin/stages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, difficulty, maxScore, description })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to add stage');
        }

        showAlert('Stage added successfully!', 'success');
        clearForm();
        await loadStages();
      } catch (error) {
        console.error('Error adding stage:', error);
        showAlert(error.message, 'danger');
      }
    }

    // Edit stage
    function editStage(stageId) {
      const stage = allStages.find(s => s.stage_id === stageId);
      if (!stage) return;

      document.getElementById('stage-name').value = stage.name;
      document.getElementById('stage-difficulty').value = stage.difficulty;
      document.getElementById('stage-max-score').value = stage.maxScore || stage.maxscore;
      document.getElementById('stage-description').value = stage.description;

      currentEditStageId = stageId;
      document.getElementById('add-stage-btn').style.display = 'none';
      document.getElementById('update-stage-btn').style.display = 'inline-block';
      document.getElementById('cancel-edit-btn').style.display = 'inline-block';

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Update stage
    async function updateStage() {
      if (!currentEditStageId) return;

      const name = document.getElementById('stage-name').value.trim();
      const difficulty = document.getElementById('stage-difficulty').value;
      const maxScore = parseInt(document.getElementById('stage-max-score').value);
      const description = document.getElementById('stage-description').value.trim();

      if (!name || !difficulty || !maxScore || !description) {
        showAlert('Please fill in all fields', 'danger');
        return;
      }

      try {
        const response = await fetch(`/api/admin/stages/${currentEditStageId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, difficulty, maxScore, description })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to update stage');
        }

        showAlert('Stage updated successfully!', 'success');
        cancelEdit();
        await loadStages();
      } catch (error) {
        console.error('Error updating stage:', error);
        showAlert(error.message, 'danger');
      }
    }

    // Delete stage
    async function deleteStage(stageId) {
      if (!confirm('Are you sure you want to delete this stage? This action cannot be undone.')) {
        return;
      }

      try {
        const response = await fetch(`/api/admin/stages/${stageId}`, {
          method: 'DELETE'
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to delete stage');
        }

        showAlert('Stage deleted successfully!', 'success');
        await loadStages();
      } catch (error) {
        console.error('Error deleting stage:', error);
        showAlert(error.message, 'danger');
      }
    }

    // Cancel edit
    function cancelEdit() {
      clearForm();
      currentEditStageId = null;
      document.getElementById('add-stage-btn').style.display = 'inline-block';
      document.getElementById('update-stage-btn').style.display = 'none';
      document.getElementById('cancel-edit-btn').style.display = 'none';
    }

    // Clear form
    function clearForm() {
      document.getElementById('stage-name').value = '';
      document.getElementById('stage-difficulty').value = '';
      document.getElementById('stage-max-score').value = '';
      document.getElementById('stage-description').value = '';
    }

    // Load progress report
    async function loadProgressReport() {
      try {
        const response = await fetch('/api/admin/reports/progress');
        if (!response.ok) throw new Error('Failed to load progress report');
        
        allProgress = await response.json();
        renderProgressTable();
      } catch (error) {
        console.error('Error loading progress:', error);
        document.getElementById('progress-table-container').innerHTML = 
          '<div class="empty-state">Failed to load progress report. Please try again.</div>';
      }
    }

    // Render progress table
    function renderProgressTable() {
      const container = document.getElementById('progress-table-container');
      
      if (allProgress.length === 0) {
        container.innerHTML = '<div class="empty-state">No student progress data available.</div>';
        return;
      }

      const tableHTML = `
        <table>
          <thead>
            <tr>
              <th class="sortable" onclick="sortProgress('username')">Username 🔽</th>
              <th class="sortable" onclick="sortProgress('totalPoints')">Total Points 🔽</th>
              <th class="sortable" onclick="sortProgress('completedCount')">Completed Stages 🔽</th>
              <th>Stage Details</th>
            </tr>
          </thead>
          <tbody>
            ${allProgress.map(student => {
              const completedStages = student.completedStages || [];
              const stageDetails = completedStages.length > 0 
                ? completedStages.map(s => `Stage ${s.stage_id}: ${s.score} pts`).join(', ')
                : 'No stages completed';
              
              return `
                <tr>
                  <td>${student.username}</td>
                  <td>${student.totalPoints || 0}</td>
                  <td>${completedStages.length}</td>
                  <td style="font-size: 12px; color: var(--text-mid);">${stageDetails}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
      
      container.innerHTML = tableHTML;
    }

    // Sort progress table
    let sortDirection = {};
    function sortProgress(field) {
      sortDirection[field] = !sortDirection[field];
      const ascending = sortDirection[field];

      allProgress.sort((a, b) => {
        let valA, valB;
        
        if (field === 'completedCount') {
          valA = (a.completedStages || []).length;
          valB = (b.completedStages || []).length;
        } else {
          valA = a[field] || 0;
          valB = b[field] || 0;
        }

        if (typeof valA === 'string') {
          return ascending 
            ? valA.localeCompare(valB)
            : valB.localeCompare(valA);
        }
        
        return ascending ? valA - valB : valB - valA;
      });

      renderProgressTable();
    }

    // Initialize page
    async function init() {
      const isAdmin = await checkAdminAuth();
      if (isAdmin) {
        await Promise.all([loadStages(), loadProgressReport()]);
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
